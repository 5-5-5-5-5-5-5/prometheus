<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" width="1200" height="320">
  <defs>
    <linearGradient id="bannerBg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0f1429"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" x2="100%" y1="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="url(#bannerBg)" rx="16"/>
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b82f6" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="320" fill="url(#grid)"/>
  </g>
  <g opacity="0.1" stroke="#3b82f6" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>
  <g transform="translate(120, 160)" filter="url(#glow)">
    <path d="M 0,-60
    C 15,-45 30,-20 30,10
    C 30,35 15,50 0,50
    C -15,50 -30,35 -30,10
    C -30,-20 -15,-45 0,-60 Z"
    fill="url(#fireGrad)" opacity="0.9"/>
    <path d="M 0,-40
    C 10,-30 20,-15 20,5
    C 20,20 10,30 0,30
    C -10,30 -20,20 -20,5
    C -20,-15 -10,-30 0,-40 Z"
    fill="#ffd700" opacity="0.95"/>
    <path d="M 0,-20
    C 5,-15 10,-5 10,5
    C 10,12 5,18 0,18
    C -5,18 -10,12 -10,5
    C -10,-5 -5,-15 0,-20 Z"
    fill="#fff" opacity="0.9"/>
  </g>
  <g opacity="0.4">
    <circle cx="950" cy="100" r="4" fill="#3b82f6" filter="url(#softGlow)"/>
    <circle cx="980" cy="80" r="3" fill="#8b5cf6" filter="url(#softGlow)"/>
    <circle cx="1020" cy="95" r="4" fill="#ec4899" filter="url(#softGlow)"/>
    <circle cx="1050" cy="120" r="3" fill="#3b82f6" filter="url(#softGlow)"/>
    <circle cx="1010" cy="140" r="4" fill="#8b5cf6" filter="url(#softGlow)"/>
    <circle cx="920" cy="180" r="3" fill="#ec4899" filter="url(#softGlow)"/>
    <circle cx="960" cy="200" r="4" fill="#3b82f6" filter="url(#softGlow)"/>
    <circle cx="1000" cy="220" r="3" fill="#8b5cf6" filter="url(#softGlow)"/>
    <circle cx="1040" cy="200" r="4" fill="#ec4899" filter="url(#softGlow)"/>
    <g stroke="#3b82f6" stroke-width="1" opacity="0.3">
      <line x1="950" y1="100" x2="980" y2="80"/>
      <line x1="980" y1="80" x2="1020" y2="95"/>
      <line x1="1020" y1="95" x2="1050" y2="120"/>
      <line x1="1050" y1="120" x2="1010" y2="140"/>
      <line x1="1010" y1="140" x2="950" y2="100"/>
      <line x1="920" y1="180" x2="960" y2="200"/>
      <line x1="960" y1="200" x2="1000" y2="220"/>
      <line x1="1000" y1="220" x2="1040" y2="200"/>
      <line x1="1040" y1="200" x2="920" y2="180"/>
    </g>
  </g>
  <text x="600" y="130"
  font-family="'Inter', 'Segoe UI', 'Arial', sans-serif"
  font-size="72"
  font-weight="900"
  fill="url(#accentGrad)"
  text-anchor="middle"
  letter-spacing="8"
  filter="url(#softGlow)">
  PROMETHEUS
</text>
<text x="600" y="180"
font-family="'Inter', 'Segoe UI', 'Arial', sans-serif"
font-size="28"
font-weight="400"
fill="#e2e8f0"
text-anchor="middle"
letter-spacing="3">
Análise, Diagnóstico e Manutenção de Código
</text>
<text x="600" y="230"
font-family="'Inter', 'Segoe UI', 'Arial', sans-serif"
font-size="18"
font-weight="300"
fill="#94a3b8"
text-anchor="middle"
letter-spacing="1">
CLI modular para JavaScript/TypeScript com suporte multi-linguagem
</text>
<g transform="translate(280, 260)">
  <rect x="0" y="0" width="160" height="36" fill="#1e3a8a" rx="18" opacity="0.8"/>
  <text x="80" y="18" fill="#dbeafe" font-family="'Inter', 'Segoe UI', sans-serif"
  font-size="14" font-weight="600" text-anchor="middle">🔍 Static Analysis</text>
  <rect x="180" y="0" width="140" height="36" fill="#14532d" rx="18" opacity="0.8"/>
  <text x="250" y="18" fill="#f0fdf4" font-family="'Inter', 'Segoe UI', sans-serif"
  font-size="14" font-weight="600" text-anchor="middle">🛡️ Auto-Fix</text>
  <rect x="340" y="0" width="160" height="36" fill="#7c2d12" rx="18" opacity="0.8"/>
  <text x="420" y="18" fill="#fff7ed" font-family="'Inter', 'Segoe UI', sans-serif"
  font-size="14" font-weight="600" text-anchor="middle">🚀 Multi-Language</text>
  <rect x="520" y="0" width="160" height="36" fill="#581c87" rx="18" opacity="0.8"/>
  <text x="600" y="18" fill="#faf5ff" font-family="'Inter', 'Segoe UI', sans-serif"
  font-size="14" font-weight="600" text-anchor="middle">🔌 Extensible</text>
</g>
<g transform="translate(1050, 50)" opacity="0.5">
  <circle cx="0" cy="0" r="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="0" cy="0" r="4" fill="#8b5cf6"/>
  <circle cx="20" cy="-15" r="6" fill="none" stroke="#ec4899" stroke-width="2"/>
  <circle cx="20" cy="-15" r="3" fill="#3b82f6"/>
</g>
<g transform="translate(60, 270)" opacity="0.3">
  <rect x="0" y="0" width="60" height="4" fill="url(#accentGrad)" rx="2"/>
  <rect x="0" y="8" width="40" height="4" fill="url(#accentGrad)" rx="2"/>
  <rect x="0" y="16" width="50" height="4" fill="url(#accentGrad)" rx="2"/>
</g>
</svg>
